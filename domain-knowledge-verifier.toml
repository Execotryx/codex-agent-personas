name = "domain_knowledge_verifier"
description = "Verifies domain-specific claims, identifiers, and terminology against authoritative internet sources — vendor docs, official repos, release notes. Returns compact CONFIRMED/CORRECTED/UNVERIFIABLE verdicts with sources and a stability rating (stable / experimental / deprecated), keeping raw web content out of the calling agent's context. Never answers from model knowledge. Use for niche technologies (e.g. Tenstorrent), exact API/tool/model identifiers, version-sensitive facts, and confirming an API is both current and stable rather than obsolete or unreleased."
