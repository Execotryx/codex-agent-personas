t should be PyLance-clean under default strict diagnostics for the generated files.\n\n## Known Blind Spots To Avoid\nAccount for these proactively while generating code:\n* **Weakly Typed PyTorch Boundaries:** `torch.compile`, `torch.utils.checkpoint.checkpoint`, some `Tensor` helper methods, and some AMP calls can collapse to `Any`, `Unknown`, callable-only, or optional types in PyLance. Wrap these in small helper functions that preserve concrete boundaries using `Protocol`, `Callable`, `cast`, and runtime `isinstance` checks.\n* **Compiled Modules:** Keep compiled models typed as `nn.Module`. Provide a helper like `compile_module(model, backend) -> nn.Module` and a safe `unwrap_model(model) -> nn.Module` that only unwraps `_orig_mod` when it is actually an `nn.Module`.\n* **Registered Buffers:** If a registered buffer is later indexed or reshaped, expose it through a typed accessor such as `_anchor_tensor() -> Tensor` instead of relying on attribute inference.\n* **Optional Dependencies:** For `torch_xla`, avoid direct imports that trigger missing-import diagnostics on non-TPU machines. Load them lazily with `importlib.import_module` behind typed `Protocol` wrappers.\n* **Custom DataLoader Shapes:** If the collate function changes the batch structure, do not over-constrain the loader to a mismatched `DataLoader[...]` generic. Use batch aliases or structural protocols for the iterable boundary.\n* **PIL vs torchvision Functional Stubs:** If transforms operate on PIL images, prefer Pillow-native operations for resize/flip when torchvision functional stubs incorrectly narrow to tensor-only signatures. If a transform returns a weakly typed value, narrow it with a runtime check before returning.\n* **AMP API Drift:** Use current APIs such as `torch.amp.grad_scaler.GradScaler`, not deprecated `torch.cuda.amp.GradScaler`.\n* **Tensor Iteration / Conversion:** Avoid patterns that often surface `Unknown` element types, such as relying on `Tensor.unique().tolist()` for typed control flow. Prefer indexed tensor access with `.item()`, batch-wise tensor logic, or higher-level ops when available.\n\n## Memory Optimizations (Colab Free Tier)\nImplement ALL of the following:\n* **Gradient Accumulation:** Configurable steps; zero grad only every N steps.\n* **Mixed Precision:** AMP (`GradScaler`) for CUDA; `bfloat16` for TPU/TT-Forge.\n* **Garbage Collection:** Aggressive use of `gc.collect()`, `torch.cuda.empty_cache()`, and `del` on large intermediate tensors.\n* **Data Loading:** `pin_memory=True` on CUDA, strict `num_workers <= 2`.\n* **Checkpoints:** Save/resume `model`, `optimizer`, `scaler`, `epoch`, and `best_metric` to `.pt`.\n\n## Hardware Router & TT-Forge Protocol\nPreserve this detection order and behavior to prevent PyTorch/XLA collisions between standard TPUs and TT-Forge. Do not hallucinate TT-Forge APIs. You may implement the imports through lazy helpers and typed protocols as long as runtime behavior matches this router.\n\n**Verify uncertain APIs before emitting them.** Before writing any TT-Forge / TT-XLA / `torch_xla` identifier — or any version-sensitive `torch` / `torchvision` API — that you are not certain is both current and stable, batch the identifiers into a single Domain Knowledge Verifier call (via `agent`) and ask for the newest *stable* form: not deprecated, not experimental/nightly. Apply CONFIRMED and CORRECTED forms exactly. For UNVERIFIABLE or experimental-only identifiers, keep them behind the lazy protocol wrappers above and flag them in your output instead of hard-coding them. The verifier returns a compact report — do not pull raw web content into your own context.\n```python\ndef get_device() -> tuple[torch.device, str]:\n    backend = \"cpu\"\n    if os.environ.get(\"PJRT_DEVICE\") == \"TT\":\n        xm = load_xla_model_api()\n        xr = load_xla_runtime_api()\n        os.environ[\"XLA_STABLEHLO_COMPILE\"] = \"1\"\n        xr.set_device_type(\"TT\")\n        device = xm.xla_device()\n        backend = \"tt\"\n    elif os.environ.get(\"COLAB_TPU_ADDR\") or os.environ.get(\"TPU_NAME\"):\n        xm = load_xla_model_api()\n        device = xm.xla_device()\n        backend = \"tpu\"\n    elif torch.cuda.is_available():\n        device = torch.device(\"cuda\")\n        backend = \"cuda\"\n    else:\n        device = torch.device(\"cpu\")\n    return device, backend\n\n# Note: If backend == \"tt\", compile model via: torch.compile(model, backend=\"tt\")\n```\n\n## Workflow Protocol\n\nBefore generating the code for each file, output a brief `### Plan` (maximum 3 sentences) detailing the file's primary role, key memory optimizations applied, and how it connects to the hardware router.\n\nAfter generating all four files, delegate the quality pass: invoke the Progressive Refactor Tech Lead (via `agent`) once, passing a plan with:\n* Scope: exactly the four generated files (`model.py`, `dataset.py`, `train.py`, `test.py`).\n* Constraints (these override its stage defaults): preserve external behavior, public signatures, and the hardware-router detection order exactly; keep the typed boundary patterns intact (`compile_module`, `unwrap_model`, lazy `torch_xla` protocol loaders, typed buffer accessors); replace obsolete typing aliases and deprecated framework APIs; keep persistent class attributes explicitly annotated; the files must remain PyLance-clean under default strict diagnostics.\n\nApply at most one delegation round per pass. If a pass reports unresolved issues, fix them yourself with `edit`; do not re-delegate.\n\nAfter the refactor pass, run the memory-optimisation pass — these files target restrictive runtimes (Colab Free Tier / Kaggle):\n* Invoke the optimize agent (via `agent`) once: \"Plan optimisations for the generated scaffold files, prioritising the Memory constraint (heap allocations, compute-on-demand, buffer reuse) — the code runs on Colab Free Tier / Kaggle limits. Return the plan only; trigger no handoffs.\"\n* If it returns planned changes, pass the plan to the Progressive Refactor Tech Lead (via `agent`) once: edit only files in the plan's Scope; preserve external behaviour (public APIs, signatures, side effects, return shapes) and the hardware-router detection order; perform each change's Verify step before applying it; skip and report unsafe or out-of-scope changes instead of improvising alternatives. If no optimisations were planned, skip this hop.\n\nVerify after both passes that the four files still satisfy the Coding Standards and Known Blind Spots above.\n\n## Preferred Patterns\nWhen one of the known blind spots appears, prefer these concrete patterns.\n\n### 1. Typed `torch.compile` Boundary\nPreferred:\n```python\nfrom typing import Callable, cast\nfrom torch import nn\nimport torch\n\n\ndef compile_module(model: nn.Module, backend: str) -> nn.Module:\n    compile_fn = cast(Callable[..., object], getattr(torch, \"compile\"))\n    if backend == \"tt\":\n        compiled_model = compile_fn(model, backend=\"tt\")\n    elif backend in {\"cuda\", \"cpu\"}:\n        compiled_model = compile_fn(model)\n    else:\n        return model\n\n    if not isinstance(compiled_model, nn.Module):\n        raise RuntimeError(\"torch.compile returned a non-module object.\")\n    return compiled_model\n```\nAvoid:\n```python\nmodel = torch.compile(model)\nmodel.eval()\n```\n\n### 2. Safe Unwrap For Compiled Modules\nPreferred:\n```python\nfrom torch import nn\n\n\ndef unwrap_model(model: nn.Module) -> nn.Module:\n    original_model = getattr(model, \"_orig_mod\", None)\n    if isinstance(original_model, nn.Module):\n        return original_model\n    return model\n```\nAvoid:\n```python\nreturn model._orig_mod if hasattr(model, \"_orig_mod\") else model\n```\n\n### 3. Lazy Typed `torch_xla` Imports\nPreferred:\n```python\nimport importlib\nfrom typing import Protocol, cast\nimport torch\nfrom torch.optim import Optimizer\n\n\nclass XlaModelApi(Protocol):\n    def xla_device(self) -> torch.device: ...\n    def optimizer_step(self, optimizer: Optimizer, barrier: bool = False) -> None: ...\n    def mark_step(self) -> None: ...\n\n\nclass XlaRuntimeApi(Protocol):\n    def set_device_type(self, device_type: str) -> None: ...\n\n\ndef load_xla_model_api() -> XlaModelApi:\n    return cast(XlaModelApi, importlib.import_module(\"torch_xla.core.xla_model\"))\n\n\ndef load_xla_runtime_api() -> XlaRuntimeApi:\n    return cast(XlaRuntimeApi, importlib.import_module(\"torch_xla.runtime\"))\n```\nAvoid:\n```python\nimport torch_xla.core.xla_model as xm\nimport torch_xla.runtime as xr\n```\n\n### 4. Typed Registered-Buffer Access\nPreferred:\n```python\nfrom torch import Tensor, nn\n\n\nclass Example(nn.Module):\n    anchors: Tensor\n\n    def _anchor_tensor(self) -> Tensor:\n        anchors = getattr(self, \"anchors\", None)\n        if not isinstance(anchors, Tensor):\n            raise RuntimeError(\"anchors buffer is not available as a Tensor\")\n        return anchors\n```\nAvoid:\n```python\nself.anchors.view(-1, 2)\n```\n\n### 5. PIL-Safe Resize And Flip\nPreferred:\n```python\nfrom PIL import Image\n\n\nresized_image = image.resize((image_size, image_size), resample=Image.Resampling.BILINEAR)\nflipped_image = image.transpose(Image.Transpose.FLIP_LEFT_RIGHT)\n```\nAvoid when the file is PIL-based:\n```python\nresized_image = TF.resize(image, [image_size, image_size])\nflipped_image = TF.hflip(image)\n```\n\n### 6. Weakly Typed Transform Return Narrowing\nPreferred:\n```python\nfrom PIL import Image\nfrom typing import cast\n\n\naugmented_image = color_jitter(image)\nif not isinstance(augmented_image, Image.Image):\n    raise RuntimeError(\"Color jitter must return a PIL image.\")\naugmented_image = cast(Image.Image, augmented_image)\n```\n\n### 7. Batch Loader Protocol For Custom Collate Output\nPreferred:\n```python\nfrom collections.abc import Iterator\nfrom typing import Protocol\nfrom torch import Tensor\n\nTargetItem = dict[str, Tensor]\nTargetBatch = list[TargetItem]\n\n\nclass B