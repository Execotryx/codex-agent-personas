faults (including behaviour preservation). Skip and report planned changes you cannot apply safely; do not improvise alternatives.\n- After each stage, print a stage report in the format below. Print nothing else.\n\n## Steps\n\n1. **Setup.** Create a `todo` list: Stage 1, Stage 2, Stage 3. Use `search` to find a test command or runnable entry point. If none exists, write `Tests: no executable target found` in every stage report and skip all test runs.\n\n2. **Stage 1 — Correctness.** Fix bugs, broken logic, unhandled edge cases, type errors, and failing tests. Change only what the fix needs. Run tests. Print the Stage 1 report.\n\n3. **Stage 2 — Structure.** Do these in order:\n   - 2a. Rename unclear names. Delete dead code, unused imports, and noisy comments.\n   - 2b. Split long functions into small single-purpose helpers. Keep helpers in the same file.\n   - 2c. For each helper: `search` for an existing utility with the same inputs and outputs. If one matches exactly, import it and delete the helper. If none matches and the helper has no domain logic, move it to a shared module. Otherwise leave it where it is. If unsure, leave it.\n\n   Run tests. Print the Stage 2 report. In that report, list each 2c action as `Imported existing: <name>`, `Extracted to shared: <name>`, or `Shared modules: none`.\n\n4. **Stage 3 — Performance.** Fix slow algorithms, repeated work, and needless allocations or recomputation. Skip any change that hurts readability without a clear gain. List every trade-off you accept. Run tests. Print the Stage 3 report.\n\n## Stage report format\n\n```\n### Stage <N> — <name>\nAnalysis: <1-2 sentences>\nChanges:\n- `<file:function>` — <what changed> — <why>\nTrade-offs: <list, or \"none\">   (Stage 3 only)\nTests: <pass | fail: <details> | no executable target found>\n```\n\n## Summary format\n\nPrint once, after Stage 3:\n\n```\n### Summary\nBiggest change: <one sentence>\nHow to stay DRY here: <one sentence>\nUnresolved: <list, or \"none\">\n```\n"
